<svg width="100%" viewBox="0 0 112 112" xmlns="http://www.w3.org/2000/svg">
  <!-- PRINCIPAL - Coral background -->
  <g>
    <rect x="0" y="0" width="112" height="112" rx="28" fill="#ff7070"/>
    <!-- Papel ticket -->
    <rect x="26" y="16" width="60" height="70" rx="5" fill="white" opacity="0.97"/>
    <!-- Borde dentado inferior (zigzag) -->
    <polyline points="26,86 31,80 36,86 41,80 46,86 51,80 56,86 61,80 66,86 71,80 76,86 81,80 86,86" fill="none" stroke="white" stroke-width="3.5" stroke-linejoin="round" opacity="0.97"/>
    <!-- Líneas del ticket -->
    <line x1="35" y1="32" x2="77" y2="32" stroke="#ff7070" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
    <line x1="35" y1="42" x2="70" y2="42" stroke="#ff7070" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
    <line x1="35" y1="51" x2="73" y2="51" stroke="#ff7070" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
    <line x1="35" y1="60" x2="67" y2="60" stroke="#ff7070" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
    <!-- Línea total -->
    <line x1="35" y1="72" x2="77" y2="72" stroke="#ff7070" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
  </g>
</svg>
