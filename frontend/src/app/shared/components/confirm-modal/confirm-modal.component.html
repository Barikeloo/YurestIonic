@if (isOpen) {
  <div class="cm-overlay" (click)="onOverlayClick($event)">
    <div class="cm-shell" role="dialog" aria-modal="true">
      <header class="cm-head">
        <h2 class="cm-title">{{ title }}</h2>
        <button type="button" class="cm-close" (click)="onCancel()" [disabled]="loading" aria-label="Cerrar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </header>

      @if (message) {
        <div class="cm-body">
          <p class="cm-message">{{ message }}</p>
        </div>
      }

      <footer class="cm-foot">
        <button
          type="button"
          class="cm-btn cm-btn--ghost"
          (click)="onCancel()"
          [disabled]="loading"
        >
          {{ cancelLabel }}
        </button>
        <button
          type="button"
          class="cm-btn"
          [class.cm-btn--primary]="variant === 'default'"
          [class.cm-btn--danger]="variant === 'danger'"
          (click)="onConfirm()"
          [disabled]="loading"
        >
          {{ loading ? 'Procesando...' : confirmLabel }}
        </button>
      </footer>
    </div>
  </div>
}
