<div class="search-bar" [class.has-value]="value !== ''">
  <span class="search-bar-icon" aria-hidden="true">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="7"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
  </span>
  <input
    type="text"
    class="search-bar-input"
    [placeholder]="placeholder"
    [attr.aria-label]="ariaLabel"
    [ngModel]="value"
    (ngModelChange)="onInput($event)"
    autocomplete="off"
    spellcheck="false"
  />
  @if (showCount) {
    <span class="search-bar-count">{{ resultsCount }} / {{ totalCount }}</span>
  }
  @if (value !== '') {
    <button type="button" class="search-bar-clear" (click)="clear()" aria-label="Limpiar búsqueda" title="Limpiar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="6" y1="6" x2="18" y2="18"></line>
        <line x1="18" y1="6" x2="6" y2="18"></line>
      </svg>
    </button>
  }
</div>
