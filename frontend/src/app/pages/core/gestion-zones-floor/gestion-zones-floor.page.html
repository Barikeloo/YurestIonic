<div class="floor-editor-page">

  <!-- ── Topbar ─────────────────────────────────────────────────────────── -->
  <header class="editor-topbar">
    <button class="topbar-back" (click)="goBack()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Gestión
    </button>

    <div class="topbar-divider"></div>

    @if (facade.zone(); as zone) {
      <span class="topbar-zone-name">{{ zone.name }}</span>
      <span class="topbar-table-count">
        {{ facade.tables().length }} mesa{{ facade.tables().length === 1 ? '' : 's' }}
      </span>
    }
  </header>

  <!-- ── Editor body ────────────────────────────────────────────────────── -->
  <div class="editor-body">

    @if (facade.loading()) {
      <div class="editor-loading">
        <div class="loading-spinner"></div>
        <span>Cargando plano…</span>
      </div>
    }

    @if (!facade.loading()) {
      <app-floor-canvas
        [tables]="facade.tables()"
        [selectedId]="facade.selectedId()"
        [zoomLevel]="zoomLevel()"
        (tableClicked)="onTableClicked($event)"
        (canvasClicked)="onCanvasClicked()"
        (tableMoved)="onTableMoved($event)"
        (tableResized)="onTableResized($event)"
        (tableNameEdited)="onTableNameEdited($event)"
        (tableShapeToggled)="onTableShapeToggled($event)"
        (removeRequested)="onRemoveRequested($event)"
        (zoomChanged)="onZoomChanged($event)"
      />

      <aside class="editor-panel">
        <app-floor-panel
          [unpositioned]="facade.unpositionedTables()"
          [selectedTable]="facade.selectedTable()"
          [isSaving]="facade.saving()"
          [isDirty]="facade.isDirty()"
          [zoomLevel]="zoomLevel()"
          (nameChanged)="onTableNameEdited($event)"
          (addTable)="onAddTable($event)"
          (placeOnCanvas)="onPlaceOnCanvas($event)"
          (removeFromCanvas)="onRemoveFromCanvas($event)"
          (shapeChanged)="onShapeChanged($event)"
          (sizeChanged)="onSizeChanged($event)"
          (zoomIn)="zoomIn()"
          (zoomOut)="zoomOut()"
          (zoomReset)="zoomReset()"
          (save)="onSave()"
        />
      </aside>
    }

  </div>

</div>
