<ion-content [fullscreen]="true" class="login-page">
  <div class="screen-login">
    <div class="login-topbar">
      <div class="login-logo">
        <div class="login-logo-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
            <line x1="3" y1="6" x2="21" y2="6" />
          </svg>
        </div>
        <span class="login-logo-text">TPV Sistema</span>
      </div>
      <button class="back-link" type="button" (click)="goBack()">Volver</button>
    </div>

    <div class="login-body">
      <section class="pin-panel">
        <div class="pin-section-label">Acceso rapido por PIN</div>

        <div class="user-select-grid">
          <button
            *ngFor="let user of quickUsers"
            type="button"
            class="user-chip"
            [class.selected]="isSelectedQuickUser(user)"
            (click)="selectUser(user)"
          >
            <div class="user-avatar" [style.background]="user.color">{{ user.initials }}</div>
            <span class="user-chip-name">{{ user.name }}</span>
          </button>
        </div>

        <div class="pin-dots">
          <div class="pin-dot" [class.filled]="isPinDotFilled(0)"></div>
          <div class="pin-dot" [class.filled]="isPinDotFilled(1)"></div>
          <div class="pin-dot" [class.filled]="isPinDotFilled(2)"></div>
          <div class="pin-dot" [class.filled]="isPinDotFilled(3)"></div>
        </div>

        <div class="pin-keypad">
          <button class="key" type="button" (click)="pinKey('1')">1</button>
          <button class="key" type="button" (click)="pinKey('2')">2</button>
          <button class="key" type="button" (click)="pinKey('3')">3</button>
          <button class="key" type="button" (click)="pinKey('4')">4</button>
          <button class="key" type="button" (click)="pinKey('5')">5</button>
          <button class="key" type="button" (click)="pinKey('6')">6</button>
          <button class="key" type="button" (click)="pinKey('7')">7</button>
          <button class="key" type="button" (click)="pinKey('8')">8</button>
          <button class="key" type="button" (click)="pinKey('9')">9</button>
          <button class="key key-del" type="button" (click)="pinDel()">⌫</button>
          <button class="key" type="button" (click)="pinKey('0')">0</button>
          <button class="key key-enter" type="button" (click)="pinEnter()">
            {{ isSubmitting ? '...' : 'Entrar' }}
          </button>
        </div>
      </section>

      <section class="email-panel">
        <form class="email-form" [formGroup]="loginForm" (ngSubmit)="submit()" novalidate>
          <div class="ready-banner">Listo: autenticacion real con API + DB + sesion</div>
          <div class="login-form-title">Iniciar sesion</div>
          <div class="login-form-sub">Accede con tu cuenta del restaurante</div>

          <div class="form-field">
            <label class="form-label" for="email">Email</label>
            <input
              id="email"
              class="form-input"
              type="email"
              formControlName="email"
              autocomplete="username"
              placeholder="restaurante@ejemplo.com"
            />
            <p class="field-error" *ngIf="loginForm.controls.email.touched && loginForm.controls.email.invalid">
              Introduce un email valido.
            </p>
          </div>

          <div class="form-field">
            <label class="form-label" for="password">Contrasena</label>
            <input
              id="password"
              class="form-input"
              type="password"
              formControlName="password"
              autocomplete="current-password"
              placeholder="••••••••"
            />
            <p class="field-error" *ngIf="loginForm.controls.password.touched && loginForm.controls.password.invalid">
              La contrasena es obligatoria.
            </p>
          </div>

          <p class="server-error" *ngIf="errorMessage">{{ errorMessage }}</p>

          <button class="btn-login" type="submit" [disabled]="isSubmitting">
            {{ isSubmitting ? 'Validando...' : 'Entrar' }}
          </button>

          <div class="login-divider">
            <div class="divider-line"></div>
            <span class="divider-text">o</span>
            <div class="divider-line"></div>
          </div>

          <button class="btn-register" type="button" (click)="onCreateAccount()">Crear cuenta nueva</button>
        </form>
      </section>
    </div>

    <app-register-modal
      [isOpen]="isRegisterModalOpen"
      (closed)="closeRegisterModal()"
      (created)="onUserCreated($event)"
    ></app-register-modal>
  </div>
</ion-content>
