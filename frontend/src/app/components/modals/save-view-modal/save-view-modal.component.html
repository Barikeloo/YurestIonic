@if (isOpen) {
  <div class="modal-overlay" (click)="onClose()">
    <div class="modal-card" (click)="$event.stopPropagation()" (keydown)="onKeydown($event)" tabindex="-1">
      <div class="modal-header">
        <div class="modal-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
        </div>
        <h3 class="modal-title">Guardar vista</h3>
        <button type="button" class="btn-close" (click)="onClose()" aria-label="Cerrar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="modal-body">
        <label class="field-label" for="viewName">Nombre de la vista</label>
        <input
          #nameInput
          id="viewName"
          type="text"
          class="field-input"
          [class.has-error]="error"
          placeholder="Ej: Pedidos críticos de hoy"
          [(ngModel)]="viewName"
          (input)="error = ''"
          maxlength="60"
          autofocus
        />
        @if (error) {
          <span class="field-error">{{ error }}</span>
        }
        <span class="char-count">{{ viewName.length }}/60</span>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-secondary" (click)="onClose()">Cancelar</button>
        <button type="button" class="btn-primary" (click)="onConfirm()">Guardar vista</button>
      </div>
    </div>
  </div>
}
