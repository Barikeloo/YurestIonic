<div class="floor-plan-wrap">
  <svg class="floor-canvas"
       viewBox="0 0 1200 800"
       preserveAspectRatio="xMidYMid meet">

    <!-- Grid background -->
    <defs>
      <pattern id="fp-grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e8e8e8" stroke-width="0.6"/>
      </pattern>
    </defs>
    <rect width="1200" height="800" fill="url(#fp-grid)" rx="4"/>
    <rect width="1200" height="800" fill="none" stroke="#d0d0d0" stroke-width="1.5" rx="4"/>

    @for (table of placedTables(); track table.id) {
      <g
        class="table-group"
        [class]="tableStatusClass(table)"
        [class.is-selected]="selectedTableId() === table.id"
        [attr.transform]="'translate(' + table.layout!.pos_x + ',' + table.layout!.pos_y + ')'"
        (click)="onTableClick(table)"
      >
        @if (table.layout!.shape === 'circle') {
          <circle
            [attr.cx]="table.layout!.width / 2"
            [attr.cy]="table.layout!.width / 2"
            [attr.r]="table.layout!.width / 2 - 1"
            class="table-shape"
          />
        } @else {
          <rect
            [attr.width]="table.layout!.width"
            [attr.height]="table.layout!.height"
            rx="8"
            class="table-shape"
          />
        }

        <text
          [attr.x]="table.layout!.width / 2"
          [attr.y]="(table.layout!.shape === 'circle' ? table.layout!.width : table.layout!.height) / 2 + 5"
          class="table-label"
        >{{ table.name }}</text>

        @if (table.status === OrderStatus.TO_CHARGE) {
          <text
            [attr.x]="table.layout!.width / 2"
            [attr.y]="(table.layout!.shape === 'circle' ? table.layout!.width : table.layout!.height) / 2 + 19"
            class="table-cobrar-label"
          >COBRAR</text>
        }
      </g>
    }
  </svg>

  @if (unpositionedCount() > 0) {
    <p class="unpositioned-notice">
      {{ unpositionedCount() }} mesa{{ unpositionedCount() === 1 ? '' : 's' }} sin posición en el plano
    </p>
  }

  @if (placedTables().length === 0) {
    <div class="empty-floor">
      <p>No hay mesas posicionadas en este plano.</p>
      <p>Ve a <strong>Gestión → Zonas → Plano</strong> para diseñar el salón.</p>
    </div>
  }
</div>
